# Zephyr Application Configuration File (Kconfig)
# This file is used to enable or disable software features, drivers, and libraries.

# Enable GPIO drivers (essential for blinking LEDs and reading buttons)
CONFIG_GPIO=y

# Enable serial peripheral drivers (used for USART2 communication on your board)
CONFIG_SERIAL=y

# Enable print outputs to the serial console (useful for printk logs)
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
